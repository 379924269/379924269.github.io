<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>华仔的记录</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="华仔的记录 - 记录学习、工作与生活的点点滴滴">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="static/css/vue.css">
</head>

<body>
  <div id="app"></div>
  <script>
    // 定义docsify插件 - 使用正确的钩子
    function countdownPlugin(hook, vm) {
      // 初始化钩子 - 首次加载时执行
      hook.init(function() {
        console.log('Docsify initialized');
      });
      
      // 每次路由变化后执行 - 这应该会在封面加载后触发
      hook.doneEach(function() {
        console.log('Route changed, checking for countdown...');
        runCountdown();
      });
    }
    
    // 运行倒计时
    function runCountdown() {
      var el = document.getElementById('countdown');
      if (el && !el.dataset.started) {
        el.dataset.started = 'true';
        var count = 10;
        el.innerText = count;
        
        console.log('Countdown started!');
        
        var timer = setInterval(function() {
          count--;
          el.innerText = count;
          console.log('Countdown:', count);
          
          if (count <= 0) {
            clearInterval(timer);
            console.log('Redirecting to README.md');
            window.location.href = './README.md';
          }
        }, 1000);
      }
    }
    
    window.$docsify = {
      // 项目名称
      // name: '华仔的记录',
      // 仓库地址，点击右上角的Github章鱼猫头像会跳转到此地址
      repo: 'https://github.com/379924269/379924269.github.io',
      // 封面支持，默认加载的是项目根目录下的_coverpage.md文件
      coverpage: true,
      // 首页只展示封面（默认为false，与README.md进行拼接）
      onlyCover: true,
      // 导航栏支持，默认加载的是项目根目录下的_navbar.md文件
      loadNavbar: true,
      // 侧边栏支持，默认加载的是项目根目录下的_sidebar.md文件
      loadSidebar: true,
      // 最大支持渲染的标题层级
      maxLevel: 5,
      // 自定义侧边栏后默认不会再生成目录，设置生成目录的最大层级（建议配置为2-4）
      subMaxLevel: 4,
      // 小屏设备下合并导航栏到侧边栏
      mergeNavbar: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '👉👉👉在这里搜索关键字👈👈👈',
        noData: '没有找到结果',
        depth: 6
      },
      // 注册插件
      plugins: [countdownPlugin]
    }
  </script>
  
  <!-- docsify的js依赖 -->
  <script src="static/js/docsify.min.js"></script>
  <!-- 图片放大缩小支持 -->
  <script src="static/js/zoom-image.min.js"></script>
  <!-- 搜索功能支持 -->
  <script src="static/js/search.min.js"></script>
  <!--在所有的代码块上添加一个简单的Click to copy按钮来允许用户从你的文档中轻易地复制代码-->
  <script src="static/js/docsify-copy-code.min.js"></script>

  <!-- 回到顶部 -->
  <script src="static/js/docsify-scroll-to-top.min.js"></script>
  <!-- 分页导航 -->
  <script src="static/js/docsify-pagination.min.js"></script>
  <!-- 页脚-->
  <script src="static/js/docsify-footer.min.js"></script>
  <!-- 代码高亮 -->
  <script src="static/js/prism-typescript.min.js"></script>
  <script src="static/js/prism-bash.min.js"></script>
</body>

</html>
